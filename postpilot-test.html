  width: 0;
  height: 0;

.toggle-slider {

                    <img src={img.url} alt="generated" />

                ))}

        {mediaTab === 'ai-video' && (

            <div className="form-group">
              <label className="form-label">อธิบายวิดีโอที่ต้องการ</label>
              <textarea

                value={videoPrompt}

                placeholder="เช่น: วิดีโอโปรโมทร้านกาแฟ บรรยากาศอบอุ่น มีควันกาแฟลอย"

            <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>

                <label className="form-label">ความยาว (วินาที)</label>

                <select className="form-select" value={aspectRatio} onChange={(e) => setAspectRatio(e.target.value)}>
                  <option value="16:9">16:9 (แนวนอน)</option>
                  <option value="9:16">9:16 (Story/Reels)</option>
                  <option value="1:1">1:1 (สี่เหลี่ยม)</option>

              </div>
            </div>
            <div className="form-group">
              <label className="form-label">สไตล์วิดีโอ</label>
              <div className="style-selector">
                {ANIMATION_STYLES.map(style => (
                  <div
                    key={style.id}
                    className={`style-option ${animStyle === style.id ? 'selected' : ''}`}
                    onClick={() => setAnimStyle(style.id)}
                  >
                    <div className="style-icon">{style.icon}</div>
                    <div className="style-label">{style.label}</div>
                  </div>
                ))}
              </div>
            </div>
            <button className="btn btn-primary" onClick={async () => {
              if (!videoPrompt) return;
              setLoading(true);
              try {
                const result = await api.generateVideo({ prompt: videoPrompt, duration: videoDuration, aspectRatio, style: animStyle });
                if (result.success && result.video) {
                  setGeneratedVideo(result.video);

                  alert(result.message || 'ยังไม่สามารถสร้างวิดีโอได้ — กรุณาตั้งค่า AI Video API ในหน้าตั้งค่า');
                }
              } catch (err) {
                console.error('Error generating video:', err);
                alert('เกิดข้อผิดพลาด: ' + err.message);
              }
              setLoading(false);
            }} disabled={loading || !videoPrompt}>
              {loading ? 'กำลังสร้าง...' : '📹 สร้างวิดีโอ'}
            </button>
            {generatedVideo && (
              <div className="preview-box mt-2">
                <video src={generatedVideo.url} controls style={{ width: '100%', borderRadius: '8px' }} />
              </div>
            )}
            {!generatedVideo && (
              <div className="info-box mt-2" style={{ background: 'rgba(59,130,246,0.1)', border: '1px solid rgba(59,130,246,0.3)', borderRadius: '8px', padding: '12px' }}>
                <div>💡 <strong>วิธีใช้:</strong> กรอกคำอธิบายวิดีโอ เลือกความยาวและสไตล์ แล้วกดสร้าง</div>
                <div style={{ marginTop: '8px', fontSize: '13px', color: '#94a3b8' }}>ต้องตั้งค่า AI Video API ในหน้า "ตั้งค่า" ก่อนใช้งาน (รองรับ Runway, Synthesia)</div>
              </div>
            )}

        )}

        {mediaTab === 'image-to-video' && (
          <div>
            <div className="form-group">
              <label className="form-label">เลือกรูปภาพต้นฉบับ</label>
              {selectedImages.length > 0 ? (
                <div>
                  <div className="info-box" style={{ background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.3)', borderRadius: '8px', padding: '12px', marginBottom: '12px' }}>
                    ✅ ใช้รูปจากขั้นตอนที่ 2 ({selectedImages.length} รูป) — เลือกรูปที่ต้องการแปลงเป็นวิดีโอ
                  </div>
                  <div className="media-grid">
                    {selectedImages.map(img => (
                      <div
                        key={img.id}
                        className={`media-item ${sourceImageFile && sourceImageFile.id === img.id ? 'selected' : ''}`}
                        onClick={() => setSourceImageFile(img)}
                        style={{ cursor: 'pointer', border: sourceImageFile && sourceImageFile.id === img.id ? '3px solid #3b82f6' : '3px solid transparent', borderRadius: '8px' }}
                      >
                        <img src={img.url} alt="source" />
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="preview-box" style={{ textAlign: 'center', padding: '30px 20px' }}>
                  <div style={{ fontSize: '48px', marginBottom: '12px' }}>📷</div>
                  <div className="form-label">ยังไม่มีรูป — อัปโหลดรูปหรือสร้างด้วย AI ก่อน</div>
                  <button className="btn btn-secondary mt-2" onClick={() => setMediaTab('upload')}>📁 ไปอัปโหลดรูป</button>
                  <button className="btn btn-secondary mt-2" style={{ marginLeft: '8px' }} onClick={() => setMediaTab('ai-image')}>🎨 ไปสร้างรูป AI</button>
                </div>
              )}
            </div>
            {sourceImageFile && (
              <div>
                <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                  <div className="form-group" style={{ flex: 1, minWidth: '150px' }}>
                    <label className="form-label">ความยาว (วินาที)</label>
                    <select className="form-select" value={videoDuration} onChange={(e) => setVideoDuration(e.target.value)}>
                      <option value="3">3 วินาที</option>
                      <option value="5">5 วินาที</option>
                      <option value="10">10 วินาที</option>
                      <option value="15">15 วินาที</option>

                  </div>

                <div className="form-group">
                  <label className="form-label">สไตล์แอนิเมชัน</label>
                  <div className="style-selector">
                    {ANIMATION_STYLES.map(style => (
                      <div
                        key={style.id}
                        className={`style-option ${animStyle === style.id ? 'selected' : ''}`}
                        onClick={() => setAnimStyle(style.id)}
                      >
                        <div className="style-icon">{style.icon}</div>
                        <div className="style-label">{style.label}</div>
                      </div>
                    ))}

                <div className="form-group">

                  <input

                    className="form-input"
                    value={videoPrompt}
                    onChange={(e) => setVideoPrompt(e.target.value)}
                    placeholder="เช่น: ซูมเข้าหาสินค้า เพิ่มแสงแฟลช"
                  />
                </div>
                <button className="btn btn-primary" onClick={async () => {
                  setLoading(true);
                  try {
                    const result = await api.imageToVideo({ imageUrl: sourceImageFile.url, duration: videoDuration, style: animStyle, prompt: videoPrompt });
                    if (result.success && result.video) {
                      setGeneratedVideo(result.video);
                    } else {
                      alert(result.message || 'ยังไม่สามารถแปลงเป็นวิดีโอได้ — กรุณาตั้งค่า AI Video API ในหน้าตั้งค่า');
                    }
                  } catch (err) {
                    console.error('Error converting image to video:', err);
                    alert('เกิดข้อผิดพลาด: ' + err.message);
                  }
                  setLoading(false);
                }} disabled={loading}>
                  {loading ? 'กำลังแปลง...' : '🎬 แปลงเป็นวิดีโอ'}

                  <div className="preview-box mt-2">
                    <video src={generatedVideo.url} controls style={{ width: '100%', borderRadius: '8px' }} />

            {!sourceImageFile && selectedImages.length > 0 && (
              <div className="info-box mt-2" style={{ background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: '8px', padding: '12px' }}>

// === SharePage Component (ENHANCED) ===
function SharePage() {
  const [accounts, setAccounts] = useState([]);
  const [selectedAccount, setSelectedAccount] = useState('');
  const [shareTab, setShareTab] = useState('url');
  const [postUrl, setPostUrl] = useState('');
  const [postText, setPostText] = useState('');
  const [selectedGroups, setSelectedGroups] = useState([]);
  const [sharing, setSharing] = useState(false);
  const [progress, setProgress] = useState({ current: 0, total: 0, successful: 0, failed: 0 });
  const [shareLogs, setShareLogs] = useState([]);
  const [speedPreset, setSpeedPreset] = useState('normal');
  const [delayMin, setDelayMin] = useState(120);
  const [delayMax, setDelayMax] = useState(300);
  const [useAiCaption, setUseAiCaption] = useState(false);
  const [captionStyle, setCaptionStyle] = useState('direct_sell');
  const [maxSharesPerDay, setMaxSharesPerDay] = useState(20);

  const SPEED_PRESETS = [
    { id: 'fast', label: 'เร็ว', min: 30, max: 120 },
    { id: 'normal', label: 'ปกติ', min: 120, max: 300 },
    { id: 'slow', label: 'ช้า (ปลอดภัย)', min: 300, max: 600 }
  ];

  const CAPTION_STYLES = [
    { id: 'direct_sell', label: 'ขายตรง 🔥' },
    { id: 'educate', label: 'ให้ความรู้ 📖' },
    { id: 'funny', label: 'ตลก 😂' },
    { id: 'story', label: 'เล่าเรื่อง 💬' },
    { id: 'question', label: 'ถามนำ ❓' },
    { id: 'announce', label: 'ประกาศ 📢' }
  ];

  useEffect(() => {
    loadAccounts();
    // Listen for share progress events
    if (api.onShareProgress) {
      api.onShareProgress((data) => {
        setProgress(data);
        setShareLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), ...data }]);
      });
    }
    if (api.onShareComplete) {
      api.onShareComplete((data) => {
        setSharing(false);
        setShareLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), message: '✅ แชร์เสร็จสิ้น', ...data }]);
      });
    }
    if (api.onShareError) {
      api.onShareError((data) => {
        setShareLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), message: '❌ ' + (data.error || 'เกิดข้อผิดพลาด'), ...data }]);
      });
    }
  }, []);

  async function loadAccounts() {
    try {
      const accs = await api.getAccounts();
      setAccounts(accs);
      if (accs.length > 0) setSelectedAccount(accs[0].id);
    } catch (err) {
      console.error('Error loading accounts:', err);
    }
  }

  function handleSpeedChange(presetId) {
    setSpeedPreset(presetId);
    const preset = SPEED_PRESETS.find(s => s.id === presetId);
    if (preset) {
      setDelayMin(preset.min);
      setDelayMax(preset.max);
    }
  }

  async function handleStartShare() {
    const hasContent = shareTab === 'url' ? postUrl : postText;
    if (!hasContent || selectedGroups.length === 0) {
      alert('กรุณากรอกเนื้อหาและเลือกกลุ่ม');
      return;
    }
    setSharing(true);
    setShareLogs([]);
    try {
      await api.startSharing({
        accountId: selectedAccount,
        shareType: shareTab,
        url: postUrl,
        text: postText,
        groups: selectedGroups,
        delayMin,
        delayMax,
        useAiCaption,
        captionStyle,
        maxSharesPerDay
      });
      setProgress({ current: 0, total: selectedGroups.length, successful: 0, failed: 0 });
    } catch (err) {
      console.error('Error starting share:', err);
      setSharing(false);
    }
  }

  async function handleStopShare() {
    try {
      await api.stopSharing();
      setSharing(false);
      setShareLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), message: '⏹️ หยุดแชร์แล้ว' }]);
    } catch (err) {
      console.error('Error stopping share:', err);
    }
  }

  return (
    <div>
      <h1 className="page-title">แชร์โพสต์</h1>

      {/* Account selection */}
      <div className="card">
        <h2 className="card-title">1. เลือกบัญชี</h2>
        {accounts.length === 0 ? (
          <div style={{ color: '#94a3b8' }}>ยังไม่มีบัญชี — ไปเพิ่มบัญชีที่หน้า "ตั้งค่า"</div>
        ) : (
          <select className="form-select" value={selectedAccount} onChange={(e) => setSelectedAccount(e.target.value)}>
            {accounts.map(acc => (
              <option key={acc.id} value={acc.id}>{acc.name}</option>
            ))}
          </select>
        )}
      </div>

      {/* Share content */}
      <div className="card">
        <h2 className="card-title">2. เนื้อหาที่จะแชร์</h2>
        <div className="tab-list">
          <button className={`tab-button ${shareTab === 'url' ? 'active' : ''}`} onClick={() => setShareTab('url')}>
            🔗 แชร์ลิงก์
          </button>
          <button className={`tab-button ${shareTab === 'text' ? 'active' : ''}`} onClick={() => setShareTab('text')}>
            ✍️ เขียนข้อความ
          </button>
        </div>

        {shareTab === 'url' && (
          <div className="form-group">
            <label className="form-label">ลิงก์โพสต์ Facebook</label>
            <input type="text" className="form-input" value={postUrl} onChange={(e) => setPostUrl(e.target.value)} placeholder="https://www.facebook.com/..." />
            <div style={{ fontSize: '12px', color: '#64748b', marginTop: '4px' }}>วางลิงก์โพสต์ที่ต้องการแชร์ไปยังกลุ่ม</div>
          </div>
        )}

        {shareTab === 'text' && (
          <div>
            <div className="form-group">
              <label className="form-label">ข้อความที่จะโพสต์</label>
              <textarea className="form-textarea" value={postText} onChange={(e) => setPostText(e.target.value)} placeholder="เขียนข้อความที่จะโพสต์ในแต่ละกลุ่ม..." rows="4" />
            </div>
            <div className="form-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
                <input type="checkbox" checked={useAiCaption} onChange={(e) => setUseAiCaption(e.target.checked)} />
                <span className="form-label" style={{ margin: 0 }}>🤖 ใช้ AI สร้างข้อความแตกต่างกันทุกกลุ่ม</span>
              </label>
              {useAiCaption && (
                <select className="form-select mt-1" value={captionStyle} onChange={(e) => setCaptionStyle(e.target.value)}>
                  {CAPTION_STYLES.map(s => (
                    <option key={s.id} value={s.id}>{s.label}</option>
                  ))}
                </select>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Speed settings */}
      <div className="card">
        <h2 className="card-title">3. ตั้งค่าความเร็ว</h2>
        <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
          {SPEED_PRESETS.map(preset => (
            <button
              key={preset.id}
              className={`btn ${speedPreset === preset.id ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => handleSpeedChange(preset.id)}
            >
              {preset.label}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: '16px', marginTop: '12px', flexWrap: 'wrap' }}>
          <div className="form-group" style={{ flex: 1, minWidth: '120px' }}>
            <label className="form-label">ดีเลย์ต่ำสุด (วินาที)</label>
            <input type="number" className="form-input" value={delayMin} onChange={(e) => setDelayMin(Number(e.target.value))} min="10" />
          </div>
          <div className="form-group" style={{ flex: 1, minWidth: '120px' }}>
            <label className="form-label">ดีเลย์สูงสุด (วินาที)</label>
            <input type="number" className="form-input" value={delayMax} onChange={(e) => setDelayMax(Number(e.target.value))} min="30" />
          </div>
          <div className="form-group" style={{ flex: 1, minWidth: '120px' }}>
            <label className="form-label">จำกัดต่อวัน</label>
            <input type="number" className="form-input" value={maxSharesPerDay} onChange={(e) => setMaxSharesPerDay(Number(e.target.value))} min="1" />
          </div>
        </div>
        <div style={{ fontSize: '12px', color: '#64748b', marginTop: '4px' }}>
          💡 ยิ่งช้า ยิ่งปลอดภัย — แนะนำ "ปกติ" หรือ "ช้า" เพื่อหลีกเลี่ยงการโดนแบน
        </div>
      </div>

      {/* Group selector */}
      {selectedAccount && (
        <div className="card">
          <h2 className="card-title">4. เลือกกลุ่มเป้าหมาย</h2>
          <GroupSelector
            api={api}
            accountId={selectedAccount}
            selectedGroups={selectedGroups}
            onSelectionChange={setSelectedGroups}
          />
        </div>
      )}

      {/* Progress & logs */}
      {sharing && (
        <div className="card">
          <h2 className="card-title">สถานะการแชร์</h2>
          <ProgressBar
            current={progress.current}
            total={progress.total}
            successCount={progress.successful}
            failCount={progress.failed}
            message={`${progress.current} / ${progress.total} กลุ่ม`}
          />
          <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
            <span style={{ color: '#10b981' }}>✅ สำเร็จ: {progress.successful}</span>
            <span style={{ color: '#ef4444' }}>❌ ล้มเหลว: {progress.failed}</span>
          </div>
        </div>
      )}

      {shareLogs.length > 0 && (
        <div className="card">
          <h2 className="card-title">ล็อกการแชร์</h2>
          <div style={{ maxHeight: '200px', overflowY: 'auto', fontSize: '13px' }}>
            {shareLogs.slice(-20).map((log, idx) => (
              <div key={idx} style={{ padding: '4px 0', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                <span style={{ color: '#64748b' }}>[{log.time}]</span> {log.message || `แชร์กลุ่มที่ ${log.current}`}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Action buttons */}
      <div style={{ display: 'flex', gap: '12px' }}>
        {!sharing ? (
          <button
            className="btn btn-primary btn-lg"
            onClick={handleStartShare}
            disabled={selectedGroups.length === 0 || (!postUrl && !postText)}
            style={{ flex: 1 }}
          >
            🚀 เริ่มแชร์ ({selectedGroups.length} กลุ่ม)
          </button>
        ) : (
          <button className="btn btn-lg" onClick={handleStopShare} style={{ flex: 1, background: '#ef4444', color: '#fff' }}>
            ⏹️ หยุดแชร์
          </button>
        )}
      </div>
    </div>
  );
}

// === PagesPage Component ===
function PagesPage() {
  const [pages, setPages] = useState([]);
  const [selectedPage, setSelectedPage] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    loadPages();
  }, []);

  async function loadPages() {
    try {
      const accs = await api.getAccounts();
      if (accs.length > 0) {
        const pgs = await api.getPages(accs[0].id);
        setPages(pgs);
      }
    } catch (err) {
      console.error('Error loading pages:', err);
    }
  }

  async function handleConnect() {
    setLoading(true);
    try {
      const newPage = await api.connectFacebookPage();
      setPages(prev => [...prev, newPage]);
    } catch (err) {
      console.error('Error connecting page:', err);
    }
    setLoading(false);
  }

  return (
    <div>
      <h1 className="page-title">จัดการเพจ Facebook</h1>

      {/* Connect Page Card */}
      <div className="card">
        <h2 className="card-title">🔗 เชื่อมต่อเพจ</h2>
        <p className="card-subtitle">เชื่อมต่อเพจ Facebook ของคุณเพื่อจัดการโพสต์ ดูสถิติ และใช้ AI บอท</p>
        <button className="btn btn-primary" onClick={handleConnect} disabled={loading}>
          {loading ? 'กำลังเชื่อมต่อ...' : '+ เชื่อมต่อเพจ Facebook'}
        </button>
      </div>

      {/* Connected Pages */}

  const [newRule, setNewRule] = useState({ trigger: '', response: '' });

  useEffect(() => {
    loadPages();
  }, []);

  async function loadPages() {
    try {
      const accs = await api.getAccounts();
      if (accs.length > 0) {
        const pgs = await api.getPages(accs[0].id);
        setPages(pgs);
        if (pgs.length > 0) setSelectedPage(pgs[0].id);
      }
    } catch (err) {
      console.error('Error loading pages:', err);
    }
  }

  async function loadSettings() {
    if (!selectedPage) return;
    try {
      const settings = await api.getChatbotSettings(selectedPage);
      setEnabled(settings.enabled);
      setPersonality(settings.personality);
      setGreeting(settings.greeting);
      const rls = await api.getChatRules(selectedPage);
      setRules(rls);
    } catch (err) {
      console.error('Error loading settings:', err);

  useEffect(() => {
    loadPages();
  }, []);

  async function loadPages() {
    try {
      const accs = await api.getAccounts();
      if (accs.length > 0) {
        const pgs = await api.getPages(accs[0].id);
        setPages(pgs);
        if (pgs.length > 0) setSelectedPage(pgs[0].id);
      }
    } catch (err) {
      console.error('Error loading pages:', err);
    }
  }

  useEffect(() => {
    if (selectedPage) loadSettings();
  }, [selectedPage]);

  async function loadSettings() {
    try {
      const settings = await api.getCommentBotSettings();
      if (settings) {
        setEnabled(settings.enabled || false);

        setSpamFilter(settings.spamFilter !== false);
        setCommentToDm(settings.commentToDm || false);

      if (sw && sw.length > 0) setSpamWords(sw.join(', '));

      console.error('Error loading comment bot settings:', err);

      setNewRule({ keyword: '', reply: '' });
    } catch (err) {
      console.error('Error saving rule:', err);

// === SettingsPage Component ===
function SettingsPage() {
  const [textAiSettings, setTextAiSettings] = useState({ provider: 'openrouter', model: 'deepseek-chat', apiKey: '' });
  const [imageAiSettings, setImageAiSettings] = useState({ provider: 'stability', model: 'stable-diffusion-3', apiKey: '' });
  const [videoAiSettings, setVideoAiSettings] = useState({ provider: 'runway', apiKey: '' });
  const [accounts, setAccounts] = useState([]);
  const [newAccountName, setNewAccountName] = useState('');
  const [addingAccount, setAddingAccount] = useState(false);

  useEffect(() => {
    loadData();
  }, []);

  async function loadData() {
    try {
      const settings = await api.getSettings();
      if (settings) {
        setTextAiSettings({
          provider: settings.ai_provider || 'openrouter',
          model: settings.ai_model || 'deepseek-chat',
          apiKey: settings.ai_api_key || ''
        });
      }
      const accs = await api.getAccounts();
      setAccounts(accs);
    } catch (err) {
      console.error('Error loading settings:', err);
    }
  }

  async function saveTextAi() {
    try {
      await api.setSetting('ai_provider', textAiSettings.provider);
      await api.setSetting('ai_model', textAiSettings.model);
      await api.setSetting('ai_api_key', textAiSettings.apiKey);
      alert('✅ บันทึกสำเร็จ!');
    } catch (err) {
      alert('❌ บันทึกล้มเหลว');
    }
  }

  async function testConnection(type) {
    try {
      if (type === 'text') {
        const result = await api.testAiConnection();
        alert(result?.success ? '✅ เชื่อมต่อสำเร็จ!' : '❌ เชื่อมต่อล้มเหลว: ' + (result?.error || ''));
      } else {
        alert('💡 ระบบจะทดสอบเมื่อคุณสร้างรูป/วิดีโอครั้งแรก');
      }
    } catch (err) {
      alert('❌ เชื่อมต่อล้มเหลว: ' + err.message);
    }
  }

  async function addAccount() {
    if (!newAccountName) return;
    try {
      await api.addAccount(newAccountName);
      setNewAccountName('');
      setAddingAccount(false);
      loadData();
    } catch (err) {
      alert('❌ เพิ่มบัญชีล้มเหลว');
    }
  }

  async function loginAccount(id) {
    try {
      const result = await api.loginAccount(id);
      if (result?.success) {
        alert('✅ เข้าสู่ระบบสำเร็จ!');
        loadData();
      } else {
        alert('❌ เข้าสู่ระบบล้มเหลว: ' + (result?.error || ''));
      }
    } catch (err) {
      alert('❌ เข้าสู่ระบบล้มเหลว: ' + err.message);
    }
  }

  async function deleteAccount(id) {
    if (!confirm('ต้องการลบบัญชีนี้?')) return;
    try {
      await api.deleteAccount(id);
      loadData();
    } catch (err) {
      alert('❌ ลบล้มเหลว');
    }
  }

  return (
    <div>
      <h1 className="page-title">ตั้งค่า</h1>

      {/* Facebook Accounts */}
      <div className="card">
        <h2 className="card-title">👤 บัญชี Facebook</h2>
        <p className="card-subtitle">เพิ่มบัญชี Facebook แล้วกด Login เพื่อเชื่อมต่อ (จะเปิดหน้าต่างเบราว์เซอร์)</p>
        {accounts.length > 0 ? (
          <div style={{ marginBottom: '12px' }}>
            {accounts.map(acc => (
              <div key={acc.id} className="rule-item">
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 500 }}>{acc.name}</div>
                  <div className="help-text">{acc.storage_state ? '🟢 เชื่อมต่อแล้ว' : '🔴 ยังไม่ได้ Login'}</div>
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button className="btn btn-sm btn-primary" onClick={() => loginAccount(acc.id)}>
                    🔑 Login
                  </button>
                  <button className="btn btn-sm btn-danger" onClick={() => deleteAccount(acc.id)}>🗑️</button>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="warning-box">ยังไม่มีบัญชี — กรุณาเพิ่มบัญชีก่อนใช้งาน</div>
        )}
        {addingAccount ? (

            <button className="btn btn-primary" onClick={addAccount}>เพิ่ม</button>

// === ProgressBar Component ===
function ProgressBar({ current, total, label, successCount, failCount, message }) {
  const percentage = total > 0 ? Math.round((current / total) * 100) : 0;
  return (
    <div className="progress-container">
      {label && <div style={{ fontWeight: 600, marginBottom: '8px' }}>{label}</div>}
      <div className="progress-bar">
        <div className="progress-fill" style={{ width: `${percentage}%` }}></div>
      </div>
      <div className="progress-text">
        <span>{message || `${current} / ${total}`}</span>
        <span>{percentage}%</span>
      </div>
      {(successCount !== undefined || failCount !== undefined) && (
        <div style={{ display: 'flex', gap: '12px', marginTop: '8px', fontSize: '12px' }}>
          {successCount !== undefined && <span className="text-success">✅ สำเร็จ {successCount}</span>}
          {failCount !== undefined && <span className="text-danger">❌ ล้มเหลว {failCount}</span>}
        </div>
      )}
    </div>
  );
}

// === GroupSelector Component ===
function GroupSelector({ api, accountId, selectedGroups, onSelectionChange }) {
  const [groups, setGroups] = useState([]);
  const [categories, setCategories] = useState([]);
  const [search, setSearch] = useState('');
  const [expandedCategories, setExpandedCategories] = useState({});

  useEffect(() => {
    loadData();
  }, [accountId]);

  async function loadData() {
    try {
      const [grps, cats] = await Promise.all([
        api.getGroups(accountId),
        api.getCategories()
      ]);
      setGroups(grps);
      setCategories(cats);
      const expanded = {};
      cats.forEach(c => expanded[c.name] = true);
      setExpandedCategories(expanded);
    } catch (err) {
      console.error('Error loading groups:', err);
    }
  }

  function toggleGroup(groupId) {
    const newSelection = selectedGroups.includes(groupId)
      ? selectedGroups.filter(id => id !== groupId)
      : [...selectedGroups, groupId];
    onSelectionChange(newSelection);
  }

  function toggleCategory(categoryName) {
    const categoryGroups = filteredGroups.filter(g => g.category === categoryName);
    const categoryGroupIds = categoryGroups.map(g => g.id);
    const allSelected = categoryGroupIds.every(id => selectedGroups.includes(id));

    let newSelection;
    if (allSelected) {
      newSelection = selectedGroups.filter(id => !categoryGroupIds.includes(id));
    } else {
      const toAdd = categoryGroupIds.filter(id => !selectedGroups.includes(id));
      newSelection = [...selectedGroups, ...toAdd];
    }
    onSelectionChange(newSelection);
  }

  function toggleExpandCategory(categoryName) {
    setExpandedCategories(prev => ({ ...prev, [categoryName]: !prev[categoryName] }));
  }

  function selectAll() {
    onSelectionChange(filteredGroups.map(g => g.id));
  }

  function deselectAll() {
    onSelectionChange([]);
  }

  const filteredGroups = groups.filter(g => {
    if (g.status === 'banned') return false;
    if (search && !g.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const groupsByCategory = {};
  filteredGroups.forEach(g => {
    const cat = g.category || 'ทั่วไป';
    if (!groupsByCategory[cat]) groupsByCategory[cat] = [];
    groupsByCategory[cat].push(g);
  });

  return (
    <div>
      <div className="form-group">
        <input
          type="text"
          className="form-input"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="ค้นหากลุ่ม..."
        />
      </div>

      <div className="action-buttons" style={{ marginBottom: '16px' }}>
        <button className="btn btn-sm btn-secondary" onClick={selectAll}>เลือกทั้งหมด</button>
        <button className="btn btn-sm btn-secondary" onClick={deselectAll}>ยกเลิกทั้งหมด</button>
      </div>

      {Object.entries(groupsByCategory).map(([category, categoryGroups]) => (
        <div key={category}>
          <div className="collapsible-header" onClick={() => toggleExpandCategory(category)}>
            <span className={`collapsible-icon ${expandedCategories[category] ? 'open' : ''}`}>▼</span>
            <span>{category}</span>
            <span className="help-text" style={{ marginLeft: 'auto' }}>({categoryGroups.length})</span>
          </div>
          {expandedCategories[category] && (
            <div style={{ paddingLeft: '24px' }}>
              {categoryGroups.map(group => (
                <div key={group.id} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 0' }}>
                  <input
                    type="checkbox"
                    checked={selectedGroups.includes(group.id)}
                    onChange={() => toggleGroup(group.id)}
                    style={{ cursor: 'pointer' }}
                  />
                  <label style={{ flex: 1, cursor: 'pointer' }}>
                    <div style={{ fontWeight: 500 }}>{group.name}</div>
                    <div className="help-text">{group.members} สมาชิก</div>
                  </label>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}

      <div className="help-text mt-2">
        เลือกแล้ว: {selectedGroups.length} กลุ่ม
      </div>
    </div>
  );
}
