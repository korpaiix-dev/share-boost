version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postpilot
      POSTGRES_USER: postpilot
      POSTGRES_PASSWORD: postpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: postpilot-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postpilot:postpilot@postgres:5432/postpilot
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@postpilot.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  uploads:
