version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: postpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postpilot
      POSTGRES_USER: postpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postpilot123}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend2
    container_name: postpilot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postpilot:${POSTGRES_PASSWORD:-postpilot123}@db:5432/postpilot
    volumes:
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    container_name: postpilot-landing
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build: ./frontend
    container_name: postpilot-frontend
    restart: unless-stopped
    expose:
      - "3000"

  nginx-proxy:
    image: nginx:alpine
    container_name: postpilot-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
